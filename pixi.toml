[workspace]
name = "shipgeometryservice"
description = "SHiP geometry service library (framework-agnostic)"
channels = ["https://prefix.dev/ship", "conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]
requires-pixi = ">=0.68"

# Lets downstream dev environments (aegir, ...) consume the geometry service
# from source: `shipgeometryservice = { path = "../geometry_service" }`.
# Mirrors ship-conda-recipes/recipes/shipgeometryservice (the release recipe);
# keep the version and the host dependencies in lockstep with it. To
# co-develop the geometry itself, point shipgeometry below at a sibling
# checkout: `shipgeometry = { path = "../geometry" }`.
[package]
name = "shipgeometryservice"
version = "0.3.0"

[package.build]
backend = { name = "pixi-build-cmake", version = "0.*" }

[package.build.config]
extra-args = [
    "-DCMAKE_CXX_STANDARD=20",
    "-DCMAKE_INSTALL_LIBDIR=lib",
    "-DBUILD_TESTING=OFF",
]

# eigen-abi-devel and nlohmann_json are needed for the same GeoModel CMake
# config reasons documented in the release recipe.
[package.host-dependencies]
shipgeometry = "*"
geomodel-core = "*"
geomodel-g4 = "*"
geant4 = "*"
mp-units = "*"
eigen-abi-devel = "*"
nlohmann_json = "*"

[dependencies]
cxx-compiler = "*"
cmake = ">=3.24"
make = "*"
ninja = "*"
git = "*"
shipgeometry = "*"
geomodel = ">=6.22"
# Required by GeoModelTools' CMake config (find_dependency via SHiPGeometry);
# not declared as a run dependency by the shipgeometry package itself.
nlohmann_json = "*"
eigen-abi-devel = "*"

[tasks]
configure = "cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo"
build = { cmd = "cmake --build build -j", depends-on = ["configure"] }
test = { cmd = "ctest --test-dir build --output-on-failure --no-tests=error", depends-on = ["build"] }

# Linting / formatting toolchain. prek orchestrates the hooks; the tools come
# from this environment so versions are tracked in pixi.lock and run identically
# everywhere (including NixOS). See .pre-commit-config.yaml.
[feature.lint.dependencies]
prek = "*"
python = ">=3.11"
clang-format = "22.*"
codespell = "*"
reuse = "*"
cffconvert = "*"
commitizen = "*"

# Pinned via PyPI to match the previous hook revs exactly: conda-forge's cpplint
# is stuck at 1.6.0 (a different, stale fork), and its gersemi (0.24.0) lags the
# repo's 0.27.7 and would reflow CMake files.
[feature.lint.pypi-dependencies]
cpplint = "==2.0.2"
gersemi = "==0.27.7"

[feature.lint.tasks]
lint = "prek run --all-files"
# Install the git hooks and route them through `pixi run` so the conda-provided
# hook tools are on PATH at commit time (required on NixOS, where the tools are
# not runnable without pixi activation).
install-hooks = '''
prek install --hook-type pre-commit --hook-type commit-msg
hooks=$(git rev-parse --git-path hooks)
sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/pre-commit"
sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/commit-msg"
'''

# --- Multi-package development (opt-in) -------------------------------------
# Build shipgeometry from a sibling checkout instead of the released conda
# package: uncomment this block and the `dev` environment below, then run
# e.g. `pixi run -e dev build`. Do NOT commit the uncommented block or the
# pixi.lock changes it causes: the committed lock must stay resolvable
# without sibling checkouts, and pixi validates every environment even when
# only the default one is used. See the Developer Guide (SHiP Documentation
# site) for the full workflow.
#
# [feature.dev.dependencies]
# shipgeometry = { path = "../geometry" }

[environments]
default = { solve-group = "default" }
lint = { features = ["lint"], solve-group = "lint" }
# dev = { features = ["dev"] }  # multi-package dev, see block above
